<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .back { color: var(--blue); text-decoration: none; font-weight: 900; font-size: 15px; }
        .title { margin: 0; font-size: 19px; font-weight: 900; }
        .spacer { width: 52px; }
        .chatArea { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .msg.received { background: #E5E7EB; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.sent { background: var(--blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .time { font-size: 11px; color: var(--muted); margin-top: 4px; align-self: flex-start; margin-left: 4px; }
        .sent + .time { align-self: flex-end; margin-right: 4px; margin-left: 0; }
        .inputRow { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px); background: #fff; border-top: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
        .inputField { flex: 1; background: #F3F4F6; border: none; padding: 12px 16px; border-radius: 24px; font-size: 15px; }
        .sendBtn { width: 40px; height: 40px; background: var(--blue); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; border-radius: 20px; font-weight: 900; }
    </style>
</head>
<body>
    <main class="app">
        <div class="scroll-content">
            <div class="topbar">
            <a class="back" href="../index.html">← Back</a>
            <h1 class="title">Maria (Nurse)</h1>
            <span class="spacer"></span>
        </div>

        <div class="chatArea">
            <div class="msg received">Hi Linda, how are you feeling today after the morning dose?</div>
            <p class="time">9:05 AM</p>
            
            <div class="msg sent">Feeling much better, thank you Maria!</div>
            <p class="time">9:12 AM</p>

            <div class="msg received">Great to hear. Don't forget your 2:00 PM Metformin.</div>
            <p class="time">10:30 AM</p>
        </div>

        <div class="inputRow">
            <div class="inputField">Type a message...</div>
            <a href="#" class="sendBtn">↑</a>
        </div>
    </main>
</body>
</html>
