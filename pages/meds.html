<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Medications</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .title { margin: 0; font-size: 20px; font-weight: 900; }
        .add { 
            text-decoration: none; color: #fff; font-weight: 900; background: var(--blue);
            padding: 10px 14px; border-radius: 14px; box-shadow: var(--shadow2); font-size: 14px;
        }
        .name { margin: 0; font-size: 17px; font-weight: 900; }
        .meta { margin: 4px 0 0; font-size: 13px; color: var(--muted); line-height: 1.4; }
        .pill { 
            white-space: nowrap; font-size: 12px; font-weight: 800; padding: 6px 12px; 
            border-radius: 999px; border: 1px solid var(--line); background: #fff;
        }
        .btn { 
            margin-top: 14px; display: flex; align-items: center; justify-content: center; 
            gap: 8px; text-decoration: none; padding: 14px; border-radius: 16px; 
            background: #F2F5FF; border: 1px solid var(--line); color: var(--text); font-weight: 900; font-size: 14px;
        }
        .btn.primary { background: var(--green); color: #fff; border: none; }
    </style>
</head>
<body>
    <main class="app">
        <div class="header">
            <h1 class="title">Medications</h1>
            <a class="add" href="../index.html">＋ Add</a>
        </div>

        <section class="card">
            <div class="row">
                <div>
                    <p class="name">Metformin</p>
                    <p class="meta">2× daily • Morning + Afternoon</p>
                </div>
                <div class="pill">1 tablet</div>
            </div>
            <a class="btn" href="confirm.html">✓ Confirm next dose</a>
        </section>

        <section class="card">
            <div class="row">
                <div>
                    <p class="name">Lisinopril</p>
                    <p class="meta">Daily • Morning</p>
                </div>
                <div class="pill">10 mg</div>
            </div>
            <a class="btn" href="log.html">View history</a>
        </section>

        <section class="card">
            <div class="row">
                <div>
                    <p class="name">Pain relief (PRN)</p>
                    <p class="meta">As needed • Max every 6 hours</p>
                </div>
                <div class="pill">1–2 tablets</div>
            </div>
        </section>
    </main>

    <nav class="nav">
        <a href="../index.html"><span class="ico">🏠</span><span>Home</span></a>
        <a class="active" href="meds.html"><span class="ico">💊</span><span>Meds</span></a>
        <a href="appointments.html"><span class="ico">📅</span><span>Visits</span></a>
        <a href="caregiver.html"><span class="ico">👥</span><span>Care</span></a>
        <a href="settings.html"><span class="ico">⚙️</span><span>Settings</span></a>
    </nav>
</body>
</html>
