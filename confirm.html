<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Confirm Dose</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #fff;
        --text: #0b1220;
        --muted: #6b7280;
        --line: #e6eaf2;
        --blue: #2f6fed;
        --green: #24a67b;
        --amber: #f59e0b;
        --shadow: 0 10px 30px rgba(13, 23, 43, 0.08);
        --shadow2: 0 6px 18px rgba(13, 23, 43, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Display",
          "SF Pro Text",
          Inter,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      .app {
        min-height: 100vh;
        padding: calc(env(safe-area-inset-top) + 14px) 16px
          calc(env(safe-area-inset-bottom) + 18px) 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .back {
        text-decoration: none;
        color: var(--blue);
        font-weight: 900;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .screenTitle {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.2px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 16px;
        box-shadow: var(--shadow2);
      }
      .label {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 8px;
      }
      .title {
        margin: 0;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.2px;
      }
      .meta {
        margin: 8px 0 0;
        font-size: 13px;
        color: #374151;
      }
      .badge {
        margin-top: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.1);
      }
      .primary {
        margin-top: 14px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
        padding: 16px 14px;
        border-radius: 16px;
        background: var(--green);
        color: #fff;
        font-weight: 900;
        font-size: 16px;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .ghost {
        flex: 1;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: #fff;
        color: #111827;
        font-weight: 900;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <a class="back" href="home.html">← Back</a>
        <h1 class="screenTitle">Confirm</h1>
        <span style="width: 52px"></span>
      </div>

      <section class="card">
        <p class="label">Scheduled now</p>
        <p class="title">Metformin</p>
        <p class="meta">1 tablet • 2:00 PM</p>
        <div class="badge">⏳ Due</div>

        <a class="primary" href="log.html">✓ Taken</a>

        <div class="row">
          <a class="ghost" href="home.html">🕒 Snooze</a>
          <a class="ghost" href="home.html">⏭ Skip</a>
        </div>
      </section>
    </main>
  </body>
</html>
